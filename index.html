<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Cyber Shield | Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Hide Stlite Native Loading Elements */
        #stlite-main-loading, .stlite-kernel-status { display: none !important; }

        body, html { margin: 0; padding: 0; background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; }
        
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100000; /* Super High Z-Index */
            transition: opacity 1.2s ease, transform 1s ease;
        }

        .info-card {
            max-width: 500px; background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;
            padding: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; color: #ffffff; letter-spacing: -1px; }
        .tagline { color: #3b82f6; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; margin-bottom: 30px; }
        
        .feature-list { text-align: left; margin: 25px 0; color: #94a3b8; font-size: 0.9rem; }
        .feature-item { margin-bottom: 12px; display: flex; align-items: center; border-left: 3px solid #3b82f6; padding-left: 15px; }

        .loader-container { margin-top: 40px; }
        .progress-track { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #3b82f6; animation: grow 12s linear forwards; }
        @keyframes grow { from { width: 0%; } to { width: 90%; } }
        
        .loading-text { font-size: 0.7rem; color: #64748b; letter-spacing: 1px; margin-top: 15px; text-transform: uppercase; }

        #root { opacity: 0; transition: opacity 1.5s ease; width: 100%; height: 100vh; }
        
        /* Transition to Ready */
        .ready #intro-screen { opacity: 0; pointer-events: none; transform: translateY(-100%); }
        .ready #root { opacity: 1; }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div class="info-card">
            <h1>CIVIC SHIELD</h1>
            <div class="tagline">Defense Intelligence Node</div>
            
            <div class="feature-list">
                <div class="feature-item">AI Anomaly Recognition Protocol</div>
                <div class="feature-item">Global Phishing Threat Intelligence</div>
                <div class="feature-item">Critical Risk Modeling Engine</div>
                <div class="feature-item">Automated Attack Simulation Console</div>
            </div>

            <div class="loader-container">
                <div class="progress-track"><div class="progress-bar"></div></div>
                <div class="loading-text">Synchronizing Secure Protocols...</div>
            </div>
        </div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["pandas", "numpy", "plotly", "scikit-learn"],
            entrypoint: "app.py",
            files: {
                "app.py": { url: "./app.py" },
                "anomaly.py": { url: "./anomaly.py" },
                "phishing.py": { url: "./phishing.py" },
                "risk_engine.py": { url: "./risk_engine.py" },
                "simulator.py": { url: "./simulator.py" },
                "incident_response.py": { url: "./incident_response.py" },
            },
        }, document.getElementById("root"));

        // DETECT DASHBOARD READY: Hide intro when Streamlit is active
        const interval = setInterval(() => {
            if (document.querySelector('.stApp')) {
                clearInterval(interval);
                setTimeout(() => {
                    document.body.classList.add('ready');
                }, 800);
            }
        }, 100);
    </script>
</body>
</html>
