<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>AI Adaptive XDR – Civic Cyber Shield</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "numpy", "plotly", "scikit-learn"],
        entrypoint: "app.py",
        files: {
          "app.py": { url: "./app.py" },
          "anomaly.py": { url: "./anomaly.py" },
          "phishing.py": { url: "./phishing.py" },
          "risk_engine.py": { url: "./risk_engine.py" },
          "simulator.py": { url: "./simulator.py" },
          "incident_response.py": { url: "./incident_response.py" },
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
