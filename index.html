<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIC SHIELD // DEFENSE HUB</title>
    <style>
        /* Absolute Block for Stlite Loader */
        #stlite-main-loading, .stlite-kernel-status, #loading-screen { display: none !important; }

        body, html { margin: 0; padding: 0; background: #000000; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; }
        
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999999;
            transition: opacity 1.2s ease, transform 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .info-card {
            max-width: 450px; background: rgba(0, 212, 255, 0.02);
            border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 4px;
            padding: 50px; text-align: center;
        }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 5px; color: #ffffff; letter-spacing: 4px; }
        .tagline { color: #00D4FF; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; margin-bottom: 40px; opacity: 0.8; }
        
        .feature-list { text-align: left; margin: 30px 0; color: #94a3b8; font-size: 0.85rem; font-family: 'monospace'; }
        .feature-item { margin-bottom: 15px; display: flex; align-items: center; border-left: 2px solid #00D4FF; padding-left: 20px; }

        .loader-container { margin-top: 50px; }
        .progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #00D4FF; animation: fillProgress 12s forwards cubic-bezier(0.1, 0, 0.1, 1); }
        @keyframes fillProgress { from { width: 0%; } to { width: 98%; } }
        
        .loading-text { font-size: 0.65rem; color: #475569; letter-spacing: 2px; margin-top: 15px; text-transform: uppercase; font-weight: 700; }

        #root { opacity: 0; transition: opacity 1s ease; width: 100%; height: 100vh; }
        .ready #intro-screen { transform: translateY(-100%); opacity: 0; }
        .ready #root { opacity: 1; }
    </style>
    <link rel="stylesheet" href="cyber-theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="intro-screen">
        <div class="info-card">
            <h1>CIVIC SHIELD</h1>
            <div class="tagline">Defense Intelligence Node</div>
            
            <div class="feature-list">
                <div class="feature-item">NEURAL ANOMALY DETECTION</div>
                <div class="feature-item">PHISHING INTEL PROTOCOL</div>
                <div class="feature-item">3D THREAT TOPOLOGY MAP</div>
                <div class="feature-item">AUTONOMOUS RISK ENGINE</div>
            </div>

            <div class="loader-container">
                <div class="progress-track"><div class="progress-bar"></div></div>
                <div class="loading-text">BOOTING SECURE_KERNEL...</div>
            </div>
        </div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.58.1/build/stlite.js"></script>
    <script>
        stlite.mount({
            requirements: ["pandas", "numpy", "plotly", "scikit-learn"],
            entrypoint: "app.py",
            files: {
                "app.py": { url: "./app.py" },
                "cyber-theme.css": { url: "./cyber-theme.css" },
                "anomaly.py": { url: "./anomaly.py" },
                "phishing.py": { url: "./phishing.py" },
                "risk_engine.py": { url: "./risk_engine.py" },
                "simulator.py": { url: "./simulator.py" },
                "incident_response.py": { url: "./incident_response.py" },
                "globe_map.py": { url: "./globe_map.py" },
            },
        }, document.getElementById("root"));

        const appCheck = setInterval(() => {
            if (document.querySelector('.stApp')) {
                clearInterval(appCheck);
                setTimeout(() => {
                    document.body.classList.add('ready');
                    window.dispatchEvent(new Event('resize'));
                }, 800);
            }
        }, 100);
    </script>
</body>
</html>
